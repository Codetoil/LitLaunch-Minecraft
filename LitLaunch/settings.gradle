pluginManagement {
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
        maven { url "https://plugins.gradle.org/m2/" }
        maven {
            url "https://repo.spring.io/release"
        }
        maven {
            url "https://repository.jboss.org/maven2"
        }
        maven {
            name = "forge"
            url = "https://files.minecraftforge.net"
        }
        maven {
            name = "sonatype"
            url = "https://oss.sonatype.org/content/repositories/snapshots/"
        }
        maven {
            name = "mvnrepository"
            url = "https://repo1.maven.org/maven2"
        }
        mavenLocal()
    }
}

include ":litlaunch-library-api",":litlaunch-libraries:event",":litlaunch-libraries:minecraft",
        ":litlaunch-libraries:minecraft-chat",":litlaunch-libraries:minecraft-client",
        ":litlaunch-libraries:minecraft-command",":litlaunch-libraries:minecraft-dimension",
        ":litlaunch-libraries:minecraft-config",":litlaunch-libraries:minecraft-event",
        ":litlaunch-libraries:minecraft-server",":litlaunch-libraries:minecraft-world",
        ":litlaunch-libraries:minecraft-mod-api"